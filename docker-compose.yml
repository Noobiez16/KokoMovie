services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kokomovie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kokomovie_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-kokomovie}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kokomovie}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    user: root
    restart: unless-stopped
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-dbPath', '/home/dynamodblocal/data']
    ports:
      - '8000:8000'
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf -X POST http://localhost:8000 -H "Content-Type: application/x-amz-json-1.0" -H "X-Amz-Target: DynamoDB_20120810.ListTables" -d "{}" || exit 1']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  dynamodb_data:
