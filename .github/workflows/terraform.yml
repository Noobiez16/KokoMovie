name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write  # OIDC for AWS assume-role

env:
  TF_VERSION: '1.8.5'
  TF_WORKING_DIR: infra/terraform
  AWS_REGION: us-east-1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

  plan-staging:
    name: Plan staging
    needs: validate
    runs-on: ubuntu-latest
    environment: staging-plan
    env:
      TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}
      TF_VAR_cloudfront_key_pair_id: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
      TF_VAR_stripe_secret_arn: ${{ secrets.STAGING_STRIPE_SECRET_ARN }}
      TF_VAR_anthropic_api_key_arn: ${{ secrets.ANTHROPIC_API_KEY_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan (staging)
        id: plan
        run: terraform plan -var-file=envs/staging.tfvars -out=tfplan-staging -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ env.TF_WORKING_DIR }}/tfplan-staging
          retention-days: 7

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan — Staging 📋
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply-staging:
    name: Apply staging
    needs: plan-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    env:
      TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}
      TF_VAR_cloudfront_key_pair_id: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
      TF_VAR_stripe_secret_arn: ${{ secrets.STAGING_STRIPE_SECRET_ARN }}
      TF_VAR_anthropic_api_key_arn: ${{ secrets.ANTHROPIC_API_KEY_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply (staging)
        run: terraform apply tfplan-staging
        working-directory: ${{ env.TF_WORKING_DIR }}

  plan-production:
    name: Plan production
    needs: apply-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production-plan
    env:
      TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
      TF_VAR_cloudfront_key_pair_id: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
      TF_VAR_stripe_secret_arn: ${{ secrets.PROD_STRIPE_SECRET_ARN }}
      TF_VAR_anthropic_api_key_arn: ${{ secrets.ANTHROPIC_API_KEY_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config="key=kokomovie/production/terraform.tfstate"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Plan (production)
        run: terraform plan -var-file=envs/production.tfvars -out=tfplan-production -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-production
          path: ${{ env.TF_WORKING_DIR }}/tfplan-production
          retention-days: 1

  apply-production:
    name: Apply production
    needs: plan-production
    runs-on: ubuntu-latest
    environment: production  # requires manual approval gate
    env:
      TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
      TF_VAR_cloudfront_key_pair_id: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
      TF_VAR_stripe_secret_arn: ${{ secrets.PROD_STRIPE_SECRET_ARN }}
      TF_VAR_anthropic_api_key_arn: ${{ secrets.ANTHROPIC_API_KEY_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config="key=kokomovie/production/terraform.tfstate"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-production
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply (production)
        run: terraform apply tfplan-production
        working-directory: ${{ env.TF_WORKING_DIR }}
