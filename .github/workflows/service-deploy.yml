name: Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'
      - '.github/workflows/service-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, catalog, playback, user, recommendation, billing]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kokomovie
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: kokomovie_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test --workspace=services/${{ matrix.service }} --if-present
        env:
          DATABASE_URL: postgresql://kokomovie:test_pass@localhost:5432/kokomovie_test
          REDIS_URL: redis://localhost:6379
          KAFKA_BROKERS: localhost:19092
          NODE_ENV: test

      - name: Lint
        run: npm run lint --workspace=services/${{ matrix.service }} --if-present

      - name: Type check
        run: npx tsc --noEmit --project services/${{ matrix.service }}/tsconfig.json

  build-push:
    name: Build & push ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service: [auth, catalog, playback, user, recommendation, billing]

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=$ECR_REGISTRY/kokomovie-${{ matrix.service }}:${{ github.sha }}
          docker build -t $IMAGE -f services/${{ matrix.service }}/Dockerfile .
          docker push $IMAGE
          docker tag $IMAGE $ECR_REGISTRY/kokomovie-${{ matrix.service }}:latest
          docker push $ECR_REGISTRY/kokomovie-${{ matrix.service }}:latest

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS services
        run: |
          for svc in auth catalog playback user recommendation billing; do
            aws ecs update-service \
              --cluster kokomovie-staging \
              --service kokomovie-$svc \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for deployment
        run: |
          for svc in auth catalog playback user recommendation billing; do
            aws ecs wait services-stable \
              --cluster kokomovie-staging \
              --services kokomovie-$svc \
              --region ${{ env.AWS_REGION }}
          done

  deploy-prod:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS services
        run: |
          for svc in auth catalog playback user recommendation billing; do
            aws ecs update-service \
              --cluster kokomovie-prod \
              --service kokomovie-$svc \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          done

      - name: Wait for deployment
        run: |
          for svc in auth catalog playback user recommendation billing; do
            aws ecs wait services-stable \
              --cluster kokomovie-prod \
              --services kokomovie-$svc \
              --region ${{ env.AWS_REGION }}
          done
