name: Electron Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Linux: AppImage + .deb → client/release/linux/ ─────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main process
        run: npm run build --workspace=client

      - name: Rebuild native modules
        run: npm run rebuild:native --workspace=client

      - name: Package Linux (.AppImage + .deb)
        run: npx electron-builder --config electron-builder.linux.yml --publish never
        working-directory: client

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            client/release/linux/*.AppImage
            client/release/linux/*.deb
            client/release/linux/latest-linux.yml
            client/release/linux/*.blockmap
          retention-days: 1

  # ─── Windows: NSIS .exe installer → client/release/windows/ ─────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main process
        run: npm run build --workspace=client

      - name: Rebuild native modules
        run: npm run rebuild:native --workspace=client

      - name: Package Windows (.exe)
        run: npx electron-builder --config electron-builder.win.yml --publish never
        working-directory: client

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            client/release/windows/*.exe
            client/release/windows/latest.yml
            client/release/windows/*.blockmap
          retention-days: 1

  # ─── Release: collect artifacts → single GitHub Release ─────────────────────
  create-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            artifacts/linux/*.AppImage
            artifacts/linux/*.deb
            artifacts/linux/latest-linux.yml
            artifacts/linux/*.blockmap
            artifacts/windows/*.exe
            artifacts/windows/latest.yml
            artifacts/windows/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
